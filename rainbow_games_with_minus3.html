<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Orbitron', sans-serif !important;
            background: linear-gradient(135deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0000FF, #4B0082, #9400D3);
            background-size: 400% 400%;
            animation: rainbowShift 15s ease infinite;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: white;
        }

        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .page-wrapper {
            display: flex;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            align-items: flex-start;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 120px;
        }

        .menu-button {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 0.75rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 3px solid rgba(255,255,255,0.5);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            height: fit-content;
            position: relative;
            font-family: 'Orbitron', sans-serif !important;
        }

        .menu-button:hover { transform: scale(1.1); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .menu-button:active { transform: scale(0.95); }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            min-width: 150px;
            z-index: 100;
            margin-top: 0.5rem;
            border: 2px solid rgba(0,0,0,0.1);
        }

        .dropdown-menu.active { display: flex; }

        .dropdown-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            color: #333;
            transition: background 0.3s;
            border: none;
            background: white;
            text-align: left;
            font-size: 0.95rem;
            font-family: 'Orbitron', sans-serif !important;
        }

        .dropdown-item:hover { background: #f0f0f0; }
        .dropdown-item:first-child { border-radius: 8px 8px 0 0; }
        .dropdown-item:last-child { border-radius: 0 0 8px 8px; }

        .game-button {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 1rem 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 3px solid rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
        }

        .game-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.15);
        }

        .game-button:active { transform: translateY(-2px); }
        .game-icon { font-size: 2.5rem; display: block; }

        .game-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif !important;
        }

        .container { flex: 1; }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.3), 6px 6px 0px rgba(0,0,0,0.2);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif !important;
        }

        .tagline {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.95);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-family: 'Orbitron', sans-serif !important;
            margin-top: 2rem;
            text-align: center;
        }

        .empty-state { text-align: center; margin-top: 4rem; }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .empty-message {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.9);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-family: 'Orbitron', sans-serif !important;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            border-radius: 0;
            padding: 0;
            width: 100%; height: 100%;
            max-height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Orbitron', sans-serif !important;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #111;
            border-bottom: 2px solid #333;
            flex-shrink: 0;
        }

        .modal-header h2 {
            color: white;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif !important;
            font-weight: 900;
            margin: 0;
        }

        .modal-menu-button {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
            padding: 0.5rem;
            position: relative;
            font-family: 'Orbitron', sans-serif !important;
        }

        .modal-menu-button:hover { opacity: 0.7; }

        .modal-dropdown {
            position: absolute;
            top: 100%; right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            min-width: 150px;
            z-index: 100;
            margin-top: 0.5rem;
            border: 2px solid rgba(0,0,0,0.1);
        }

        .modal-dropdown.active { display: flex; }

        .modal-dropdown-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            color: #333;
            transition: background 0.3s;
            border: none;
            background: white;
            text-align: left;
            font-size: 0.95rem;
            font-family: 'Orbitron', sans-serif !important;
        }

        .modal-dropdown-item:hover { background: #f0f0f0; }
        .modal-dropdown-item:first-child { border-radius: 8px 8px 0 0; }
        .modal-dropdown-item:last-child { border-radius: 0 0 8px 8px; }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: white;
            transition: color 0.3s;
            font-family: 'Orbitron', sans-serif !important;
        }

        .close-btn:hover { color: #aaa; }

        .game-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif !important;
            width: 100%;
            overflow: hidden;
            background: #000;
        }

        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        input, button, textarea, select { font-family: 'Orbitron', sans-serif !important; }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .page-wrapper { flex-direction: column; }
            .sidebar { flex-direction: row; min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="sidebar">
            <div class="menu-button" onclick="toggleMenu(event)">
                ⋮
                <div class="dropdown-menu" id="sideMenu">
                    <button class="dropdown-item" onclick="handleMenuClick('settings')">Settings</button>
                    <button class="dropdown-item" onclick="handleMenuClick('about')">About</button>
                    <button class="dropdown-item" onclick="handleMenuClick('credits')">Credits</button>
                </div>
            </div>

            <button class="game-button" onclick="openGame('sidelines')">
                <span class="game-icon">🏟️</span>
                <span class="game-name">SIDELINES</span>
            </button>

            <button class="game-button" onclick="openGame('minus3')">
                <span class="game-icon">👁️</span>
                <span class="game-name">-3</span>
            </button>
        </div>

        <div class="container">
            <header>
                <h1>🌈 RAINBOW GAMES</h1>
            </header>

            <div class="empty-state">
                <div class="empty-icon">🎮</div>
                <p class="empty-message">Click a game to start playing!</p>
            </div>

            <p class="tagline">Unblocked Fun Games for Everyone!</p>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="gameTitle">Game</h2>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <button class="modal-menu-button" onclick="toggleGameMenu(event)">
                        ⋮
                        <div class="modal-dropdown" id="gameMenu">
                            <button class="modal-dropdown-item" onclick="handleGameMenuClick('restart')">Restart</button>
                            <button class="modal-dropdown-item" onclick="closeGame()">Close</button>
                        </div>
                    </button>
                    <button class="close-btn" onclick="closeGame()">✕</button>
                </div>
            </div>
            <div id="gameArea" class="game-content"></div>
        </div>
    </div>

    <script>
        function toggleMenu(event) {
            event.stopPropagation();
            document.getElementById('sideMenu').classList.toggle('active');
        }

        function toggleGameMenu(event) {
            event.stopPropagation();
            document.getElementById('gameMenu').classList.toggle('active');
        }

        function handleMenuClick(option) {
            alert(`You clicked: ${option}`);
            document.getElementById('sideMenu').classList.remove('active');
        }

        function handleGameMenuClick(option) {
            document.getElementById('gameMenu').classList.remove('active');
            if (option === 'restart') {
                const current = document.getElementById('gameArea').dataset.current;
                if (current) openGame(current, true);
            }
        }

        document.addEventListener('click', () => {
            document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('gameMenu').classList.remove('active');
        });

        function openGame(gameType, isRestart) {
            const modal = document.getElementById('gameModal');
            const gameArea = document.getElementById('gameArea');
            const gameTitle = document.getElementById('gameTitle');

            gameArea.dataset.current = gameType;
            modal.classList.add('active');

            if (gameType === 'sidelines') {
                gameTitle.textContent = 'SIDELINES';
                loadSidelines();
            } else if (gameType === 'minus3') {
                gameTitle.textContent = '-3';
                loadMinus3();
            }
        }

        function closeGame() {
            document.getElementById('gameModal').classList.remove('active');
            document.getElementById('gameArea').innerHTML = '';
        }

        function loadMinus3() {
            const gameArea = document.getElementById('gameArea');
            gameArea.innerHTML = '';
            const iframe = document.createElement('iframe');
            iframe.className = 'game-frame';
            iframe.src = 'https://cdn.jsdelivr.net/gh/web-ports/baldi-mods@main/-3/index.html';
            iframe.allow = 'fullscreen';
            iframe.setAttribute('allowfullscreen', '');
            gameArea.appendChild(iframe);
        }

        function loadSidelines() {
            const gameArea = document.getElementById('gameArea');
            gameArea.style.background = '#87CEEB';
            gameArea.innerHTML = `
                <div style="text-align: center; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; background: #87CEEB;">
                    <div id="sidelinesScore" style="font-size: 2rem; margin: 1rem 0; color: #333; font-family: 'Orbitron', sans-serif;">Score: 0</div>
                    <canvas id="sidelinesCanvas" width="800" height="500" style="border: 3px solid #333; background: #87CEEB; border-radius: 10px; display: block; max-width: 90vw; max-height: 65vh;"></canvas>
                    <div style="margin-top: 1rem; color: #333; font-family: 'Orbitron', sans-serif; font-size: 0.85rem;">Click or press SPACE to jump. Avoid obstacles!</div>
                    <button style="margin-top: 1rem; padding: 0.75rem 1.5rem; background: linear-gradient(135deg, #FF0000, #9400D3); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-family: 'Orbitron', sans-serif;" onclick="loadSidelines()">New Game</button>
                </div>
            `;

            const canvas = document.getElementById('sidelinesCanvas');
            const ctx = canvas.getContext('2d');

            const player = { x: 50, y: canvas.height - 80, width: 25, height: 40, velocityY: 0, isJumping: false };
            const gravity = 0.5, jumpPower = -12;
            let score = 0, gameRunning = true, obstacles = [], obstacleSpeed = 5;

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !player.isJumping && gameRunning) {
                    player.velocityY = jumpPower; player.isJumping = true;
                }
            });

            canvas.addEventListener('click', () => {
                if (!player.isJumping && gameRunning) { player.velocityY = jumpPower; player.isJumping = true; }
            });

            function createObstacle() {
                const size = Math.random() * 20 + 25;
                obstacles.push({ x: canvas.width, y: canvas.height - size - 40, width: 30, height: size });
            }

            function gameLoop() {
                if (!gameRunning) return;
                player.velocityY += gravity;
                player.y += player.velocityY;
                if (player.y + player.height >= canvas.height - 40) { player.y = canvas.height - player.height - 40; player.velocityY = 0; player.isJumping = false; }
                if (player.y <= 0) { player.y = 0; player.velocityY = 0; }
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].x -= obstacleSpeed;
                    if (obstacles[i].x + obstacles[i].width < 0) { obstacles.splice(i, 1); score += 10; obstacleSpeed += 0.5; document.getElementById('sidelinesScore').textContent = `Score: ${score}`; }
                }
                for (let obs of obstacles) {
                    if (player.x < obs.x + obs.width && player.x + player.width > obs.x && player.y < obs.y + obs.height && player.y + player.height > obs.y) {
                        gameRunning = false; document.getElementById('sidelinesScore').textContent = `Game Over! Score: ${score}`; return;
                    }
                }
                ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#228B22'; ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
                ctx.fillStyle = '#FF0000'; ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillStyle = '#8B4513';
                for (let obs of obstacles) ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                setTimeout(gameLoop, 30);
            }

            setInterval(() => { if (gameRunning) createObstacle(); }, 1200);
            gameLoop();
        }
    </script>
</body>
</html>
